name: League Data Sync

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      full_scan:
        description: "Run a full historical scan from league start date"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      R_LIBS_USER: packrat/lib-R

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.0"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libjpeg-dev \
            libtiff-dev \
            libfontconfig1 \
            libxcb1 \
            libicu-dev \
            libcairo2-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libudunits2-dev \
            librsvg2-dev

      - name: Write .Renviron
        run: |
          cat > .Renviron <<'EOF'
          TEAM_CODE=LEAGUE
          PITCH_DATA_BACKEND=postgres
          PITCH_DATA_DB_URL=${{ secrets.PITCH_DATA_DB_URL }}
          PITCH_DATA_SYNC_AFTER_FTP=1
          PITCH_DATA_SYNC_WORKERS=1
          PITCH_DATA_FORCE_RESYNC=0
          TM_SYNC_START_YEAR=2026
          TM_SYNC_LOOKBACK_DAYS=2
          TM_SYNC_INITIAL_FULL=0
          TM_SYNC_LEAGUE_FULL_SCAN=${{ github.event.inputs.full_scan == 'true' && '1' || '0' }}
          EOF

      - name: Ensure Packrat library path
        run: mkdir -p packrat/lib-R

      - name: Cache Packrat library
        uses: actions/cache@v4
        with:
          path: packrat/lib-R
          key: ${{ runner.os }}-r-packrat-${{ hashFiles('packrat/packrat.lock') }}
          restore-keys: |
            ${{ runner.os }}-r-packrat-

      - name: Install R packages
        env:
          R_LIBS_USER: packrat/lib-R
        run: Rscript install_packages.R

      - name: Sync LEAGUE data
        env:
          R_LIBS_USER: packrat/lib-R
        run: Rscript --vanilla automated_data_sync.R
